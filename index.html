:root {
  --bg:       #111214;
  --bg2:      #16181b;
  --bg3:      #1c1f24;
  --surface:  #212428;
  --border:   #2e3238;
  --border2:  #3a3f47;
  --text:     #e8eaed;
  --muted:    #7a8292;
  --muted2:   #525a66;
  --neon:     #b8ff57;
  --neon2:    #d4ff8a;
  --neon-dim: rgba(184,255,87,0.12);
  --neon-glow:rgba(184,255,87,0.35);
  --accent:   #8affcb;
  --warn:     #ffcc44;
  --danger:   #ff5566;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Sarabun',sans-serif;
  font-size:16px;
  line-height:1.65;
  min-height:100vh;
  overflow-x:hidden;
}
/* Scanline texture: ปรับเพื่อลดการประมวลผลซ้ำซ้อน */
body::after{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);
  pointer-events:none;z-index:9999;
}
h1,h2,h3,h4,.mono{font-family:'Chakra Petch',sans-serif;}
.jb{font-family:'JetBrains Mono',monospace;}
a{color:inherit;text-decoration:none;}

/* ====== LAYOUT ====== */
.app{display:flex;flex-direction:column;min-height:100vh;}
.main-content{flex:1;}

/* ====== NAV ====== */
#navbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(17,18,20,0.92);
  backdrop-filter:blur(8px); /* ลด blur ลงเพื่อเพิ่ม performance */
  border-bottom:1px solid var(--border);
}
.nav-inner{
  max-width:1200px;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;gap:0;height:58px;
}
.nav-logo{
  display:flex;align-items:center;gap:10px;
  font-family:'Chakra Petch',sans-serif;
  font-weight:700;font-size:1.1rem;
  color:var(--neon);
  margin-right:36px;
  cursor:pointer;
}
