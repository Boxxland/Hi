<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แผนที่ประเทศกล่องแลนด์</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
}

#map {
    width: 100%;
    height: 100%;
}

.leaflet-popup-content {
    font-size: 16px;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// =======================
// สร้างแผนที่
// =======================
const map = L.map("map", {
    crs: L.CRS.Simple,
    minZoom: -2,
    maxZoom: 4
});

// ขนาดรูปแผนที่
const width = 1000;
const height = 1600;

// กำหนดขอบเขต
const bounds = [
    [0, 0],
    [height, width]
];

// =======================
// ใส่รูปแผนที่ประเทศ
// =======================
// เปลี่ยนเป็นชื่อไฟล์รูปของมึง
const image =
L.imageOverlay("your-map.png", bounds).addTo(map);

map.fitBounds(bounds);

// =======================
// รัฐกล่องแลนด์
// =======================
const glongland = L.polygon([
    [300,200],
    [300,700],
    [700,700],
    [700,200]
], {
    color: "lime",
    fillColor: "#5eff00",
    fillOpacity: 0.4
}).addTo(map);

glongland.bindPopup(`
<h3>สาธารณรัฐประชาชนกล่องแลนด์</h3>
เมืองหลวง : รัฐกล่องแลนด์<br>
ประชากร : 10,000,000 คน<br>
บริการส่งของหลัก : กล่อง Express
`);

// =======================
// รัฐพัสดุ
// =======================
const parcel = L.polygon([
    [720,350],
    [720,850],
    [1000,850],
    [1000,350]
], {
    color: "orange",
    fillColor: "orange",
    fillOpacity: 0.4
}).addTo(map);

parcel.bindPopup(`
<h3>รัฐพัสดุ</h3>
เมืองหลัก : พัสดุซิตี้<br>
บริการส่งของ : Parcel Delivery
`);

// =======================
// รัฐส่งของ
// =======================
const delivery = L.polygon([
    [1000,200],
    [1000,950],
    [1400,950],
    [1400,200]
], {
    color: "cyan",
    fillColor: "cyan",
    fillOpacity: 0.4
}).addTo(map);

delivery.bindPopup(`
<h3>รัฐส่งของ</h3>
เมืองหลัก : ส่งของซิตี้<br>
บริการส่งของ : Delivery Hub
`);

// =======================
// จุดบริการส่งพัสดุ
// =======================
L.marker([500,450])
.addTo(map)
.bindPopup(`
📦 ศูนย์กระจายพัสดุกลาง<br>
เปิด 24 ชั่วโมง
`);

L.marker([850,600])
.addTo(map)
.bindPopup(`
📦 Parcel Hub พัสดุซิตี้
`);

L.marker([1200,500])
.addTo(map)
.bindPopup(`
📦 Delivery Hub สาขาใต้
`);

// =======================
// แสดงพิกัดเมื่อกด
// =======================
map.on("click", function(e){
    console.log(
        "Y:",
        Math.round(e.latlng.lat),
        "X:",
        Math.round(e.latlng.lng)
    );
});

</script>

</body>
</html>
